name: CI

on:
  push:
    branches: ["main", "feature/**", "docs/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y build-essential libmnl-dev libnl-genl-3-dev

      - name: Install nerves_bootstrap
        run: mix archive.install hex nerves_bootstrap --force

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}-otp28
          restore-keys: ${{ runner.os }}-mix-

      - name: Fetch dependencies
        run: mix deps.get
      - name: Run CI checks
        run: mix ci

  firmware:
    name: Firmware (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target: [rpi3, rpi5]
    env:
      MIX_TARGET: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate SSH key for Nerves config
        run: ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519 -N ""

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "28"

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y build-essential squashfs-tools libmnl-dev libnl-genl-3-dev

      - name: Install fwup
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FWUP_VERSION=$(gh release view --repo fhunleth/fwup --json tagName -q '.tagName | ltrimstr("v")')
          curl -L "https://github.com/fhunleth/fwup/releases/download/v${FWUP_VERSION}/fwup_${FWUP_VERSION}_amd64.deb" -o /tmp/fwup.deb
          sudo apt-get install -y /tmp/fwup.deb

      - name: Install nerves_bootstrap
        run: mix archive.install hex nerves_bootstrap --force

      - uses: actions/cache@v4
        with:
          path: ~/.nerves/artifacts
          key: nerves-artifacts-${{ matrix.target }}-${{ hashFiles('mix.lock') }}
          restore-keys: nerves-artifacts-${{ matrix.target }}-

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.target }}-${{ hashFiles('mix.lock') }}-otp28
          restore-keys: ${{ runner.os }}-mix-${{ matrix.target }}-

      - run: mix deps.get
      - run: mix firmware
